<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PQC 준비도 스캐너 — 한국 주요 50개 도메인의 양자내성암호 전환 준비도 데모 대시보드. 합성 데이터 기반 강의 프로젝트입니다."
    />
    <!--
      SPEC-PQC-001 §3.2 (REQ-THM-004): 초기 fallback. 워밍 모노크롬 light :root
      --background (38 25% 94% 크림) 의 hex 등가. mount 직후 useSyncManifestThemeColor
      가 resolvedTheme 에 맞춰 갱신한다.
    -->
    <meta name="theme-color" content="#F4F1EC" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>PQC 준비도 스캐너</title>
    <!--
      SPEC-PQC-001 §3.2 — FOUC (Flash Of Unstyled Content) 방지.
      React 가 mount 되기 전 동기적으로 저장된 테마를 읽어 <html> 에 .dark 를 적용한다.
      next-themes 의 storageKey 와 동일한 'pqc-scanner:theme' 키를 사용하며,
      값이 없거나 'system' 이면 prefers-color-scheme 미디어 쿼리로 폴백한다.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('pqc-scanner:theme');
          var theme = stored || 'system';
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage 차단(REQ-THM-011) 또는 SSR 환경 — System 기본값 유지 */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
